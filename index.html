<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspberry Pi 5 Power Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px; color: #333;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center;
        }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1.1em; }
        .badge {
            display: inline-block; padding: 5px 12px; border-radius: 20px;
            font-size: 0.8em; font-weight: 600; margin-top: 10px;
            background: #d4edda; color: #155724;
        }
        .stats-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 20px;
        }
        .stat-card {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }
        .stat-card.energy {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .stat-card.energy .stat-label { color: rgba(255, 255, 255, 0.9); }
        .stat-card.energy .stat-value { color: white; }
        .stat-label {
            color: #666; font-size: 0.9em; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 10px;
        }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #667eea; }
        .stat-unit { font-size: 0.6em; color: #999; margin-left: 5px; }
        .stat-card.energy .stat-unit { color: rgba(255, 255, 255, 0.8); }
        .chart-container {
            background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; height: 500px;
            margin-bottom: 20px;
        }
        .status {
            display: inline-block; padding: 5px 15px; border-radius: 20px;
            font-size: 0.9em; font-weight: 600;
        }
        .status.online { background: #d4edda; color: #155724; }
        .status.offline { background: #f8d7da; color: #721c24; }
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .stat-value { font-size: 2em; }
            .chart-container { height: 350px; padding: 15px; }
        }
        .footer { text-align: center; margin-top: 20px; color: white; opacity: 0.8; }
        .rails-container {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        .rails-title {
            font-size: 1.3em; font-weight: bold; color: #667eea;
            margin-bottom: 20px; text-align: center;
        }
        .rails-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .rail-item {
            padding: 12px; background: #f8f9fa; border-radius: 8px;
            border-left: 3px solid #667eea;
        }
        .rail-name {
            font-weight: 600; font-size: 0.85em; color: #555;
            margin-bottom: 5px;
        }
        .rail-values {
            font-size: 0.8em; color: #777;
        }
        .rail-power {
            font-weight: bold; color: #667eea; font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥧 Team 23 Raspberry Pi 5 Power and Temp Monitor</h1>
            <p class="subtitle">Real-time hardware power monitoring via PMIC</p>
            <div style="margin-top: 15px;">
                <span class="status online" id="status">● Live</span>
                <span class="badge">● Hardware Monitoring</span>
            </div>
        </div>
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Current Power</div>
                <div class="stat-value"><span id="current-power">--</span><span class="stat-unit">W</span></div>
            </div>
            <div class="stat-card energy">
                <div class="stat-label">Total Energy</div>
                <div class="stat-value"><span id="total-energy">--</span><span class="stat-unit">Wh</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average Power</div>
                <div class="stat-value"><span id="avg-power">--</span><span class="stat-unit">W</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Peak Power</div>
                <div class="stat-value"><span id="peak-power">--</span><span class="stat-unit">W</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Min Power</div>
                <div class="stat-value"><span id="min-power">--</span><span class="stat-unit">W</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">CPU Temperature</div>
                <div class="stat-value">
                    <span id="cpu-temp">--</span><span class="stat-unit">°C</span>
                </div>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="powerChart"></canvas>
        </div>

        <!-- NEW: CPU Temperature chart -->
        <div class="chart-container">
            <canvas id="tempChart"></canvas>
        </div>

        <div class="rails-container">

            <div class="rails-title">⚡ Power Rails Breakdown</div>
            <div class="rails-grid" id="rails-grid">Loading rail data...</div>
        </div>
        <div class="footer"><p>Last updated: <span id="last-update">--</span></p></div>
    </div>
    <script>
        const ctx = document.getElementById('powerChart').getContext('2d');
        const powerChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], datasets: [{
                    label: 'Total Power (W)', data: [], borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)', borderWidth: 2,
                    fill: true, tension: 0.4, pointRadius: 0, pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 0 },
                scales: {
                    y: {
                        beginAtZero: true, title: { display: true, text: 'Power (Watts)', font: { size: 14, weight: 'bold' }},
                        grid: { color: 'rgba(0, 0, 0, 0.05)' }
                    },
                    x: {
                        title: { display: true, text: 'Time', font: { size: 14, weight: 'bold' }},
                        grid: { color: 'rgba(0, 0, 0, 0.05)' },
                        ticks: { maxTicksLimit: 10 }
                    }
                },
                plugins: { legend: { display: true, position: 'top' }, tooltip: { mode: 'index', intersect: false }}
            }
        });
        
        
    // NEW: CPU Temperature chart
        const tempCtx = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(tempCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'CPU Temperature (°C)',
                    data: [],
                    borderColor: '#e67e22', // orange
                    backgroundColor: 'rgba(230, 126, 34, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                scales: {
                    y: {
                        beginAtZero: false,
                        title: { display: true, text: 'Temperature (°C)', font: { size: 14, weight: 'bold' }},
                        grid: { color: 'rgba(0, 0, 0, 0.05)' }
                    },
                    x: {
                        title: { display: true, text: 'Time', font: { size: 14, weight: 'bold' }},
                        grid: { color: 'rgba(0, 0, 0, 0.05)' },
                        ticks: { maxTicksLimit: 10 }
                    }
                },
                plugins: {
                    legend: { display: true, position: 'top' },
                    tooltip: { mode: 'index', intersect: false }
                }
            }
        });
        // above section added on 3/13/2026
        
        async function updateData() {
            try {
                const response = await fetch('/api/power');
                const data = await response.json();
                
                if (data.power_readings && data.power_readings.length > 0) {
                    powerChart.data.labels = data.power_readings.map(d => d.timestamp);
                    powerChart.data.datasets[0].data = data.power_readings.map(d => d.power);
                    powerChart.update('none');
                    
                    const powerValues = data.power_readings.map(d => d.power);
                    const currentPower = powerValues[powerValues.length - 1];
                    const avgPower = powerValues.reduce((a, b) => a + b, 0) / powerValues.length;
                    const peakPower = Math.max(...powerValues);
                    const minPower = Math.min(...powerValues);
                    
                    document.getElementById('current-power').textContent = currentPower.toFixed(2);
                    document.getElementById('total-energy').textContent = data.total_energy_wh.toFixed(4);
                    document.getElementById('avg-power').textContent = avgPower.toFixed(2);
                    document.getElementById('peak-power').textContent = peakPower.toFixed(2);
                    document.getElementById('min-power').textContent = minPower.toFixed(2);
                    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                    
                    if (data.rails) {
                        const railsGrid = document.getElementById('rails-grid');
                        const sortedRails = Object.entries(data.rails).sort((a, b) => b[1].power - a[1].power);
                        let railsHtml = '';
                        for (const [name, vals] of sortedRails) {
                            railsHtml += `
                                <div class="rail-item">
                                    <div class="rail-name">${name}</div>
                                    <div class="rail-power">${vals.power.toFixed(3)} W</div>
                                    <div class="rail-values">${vals.voltage.toFixed(2)}V × ${vals.current.toFixed(3)}A</div>
                                </div>`;
                        }
                        railsGrid.innerHTML = railsHtml;
                    }
            
            // ----- NEW: CPU temperature chart & stat card -----
                            if (data.cpu_temp_readings && data.cpu_temp_readings.length > 0) {
                                const tempLabels = data.cpu_temp_readings.map(d => d.timestamp);
                                const temps = data.cpu_temp_readings.map(d => d.temp);

                                tempChart.data.labels = tempLabels;
                                tempChart.data.datasets[0].data = temps;
                                tempChart.update('none');

                                const lastTemp = temps[temps.length - 1];
                                document.getElementById('cpu-temp').textContent = lastTemp.toFixed(1);
                            } else {
                                document.getElementById('cpu-temp').textContent = "--";
                            }
                            
                            document.getElementById('status').className = 'status online';
                            document.getElementById('status').textContent = '● Live';
                        }
                    } catch (error) {
                        console.error('Error fetching data:', error);
                        document.getElementById('status').className = 'status offline';
                        document.getElementById('status').textContent = '● Offline';
                        document.getElementById('cpu-temp').textContent = "--";
                    }

                }
                
                
                updateData();
                setInterval(updateData, 1000);
    </script>
</body>
</html>
